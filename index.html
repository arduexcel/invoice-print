<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سیستەمی وێستگە و پارکینگ - وەشانی نوێ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        :root { --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --dark: #2c3e50; --warning: #f39c12; --parking: #9b59b6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 0; direction: rtl; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 350px; text-align: center; }

        .container { max-width: 550px; margin: 10px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #ebf5fb; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #d4e6f1; }
        .stat-card h4 { margin: 0; color: #5d6d7e; font-size: 13px; }
        .stat-card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: var(--dark); }

        .top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 10px; }
        button { cursor: pointer; border-radius: 6px; border: none; font-family: inherit; font-weight: bold; transition: 0.2s; }
        .btn-report { background: var(--dark); color: white; padding: 8px 15px; }
        .btn-parking { background: var(--parking); color: white; padding: 8px 15px; flex: 1; }
        .parking-active { background: #6c3483 !important; border: 2px solid #fff; }
        .btn-logout { background: var(--danger); color: white; padding: 8px 15px; }

        .form-group { margin-bottom: 12px; position: relative; }
        .row-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .row-group .form-group { flex: 1; margin-bottom: 0; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 18px; outline: none; box-sizing: border-box; }
        
        /* لیستی هەڵبژاردنی هێڵ ئەگەر سەیارەکە لە دوو هێڵ بوو */
        #multiMatchList {
            display: none;
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .match-item {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .match-item:last-child { border: none; }
        .match-item:hover { background: #fff1b8; }

        .price-container { position: relative; display: flex; align-items: center; gap: 5px; }
        .btn-half { background: var(--warning); color: white; padding: 10px; border-radius: 8px; font-size: 20px; width: 60px; height: 50px; display: flex; justify-content: center; align-items: center; }

        .btn-save { width: 100%; padding: 15px; background: var(--success); color: white; font-size: 18px; margin-top: 10px; }

        #report-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 650px; max-height: 85vh; overflow-y: auto; position: relative; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background: #f8f9fa; }

        #invoice-print { display: none; }
        @media print {
            body * { visibility: hidden; }
            #invoice-print, #invoice-print * { visibility: visible; }
            #invoice-print { display: block !important; width: 58mm; text-align: center; position: absolute; top: 0; left: 0; padding: 5px; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="https://arduexcel.github.io/img/ms-icon-144x144.png" width="80">
        <h3>چوونە ژوورەوە</h3>
        <select id="userSelect"><option>بار دەبێت...</option></select>
        <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); color:white; margin-top:15px;">داخڵبوون</button>
    </div>
</div>

<div class="container" id="main-content" style="display: none;">
    <div class="top-bar">
        <button class="btn-logout" onclick="logout()">دەرچوون</button>
        <button id="parkingModeBtn" class="btn-parking" onclick="toggleParkingMode()">🅿️ پارکینگ</button>
        <button class="btn-report" onclick="openMyReport()">ڕاپۆرت</button>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><h4>کۆی پارەی ئەمڕۆت</h4><p id="myTotalMoney">0 دینار</p></div>
        <div class="stat-card"><h4>ژمارەی وەسڵەکانت</h4><p id="myTotalCount">0</p></div>
    </div>

    <div class="form-group">
        <label>ژمارەی ئۆتۆمبێل</label>
        <input type="text" id="carNumberInput" oninput="searchCarLocally(this.value)" onkeypress="handleEnter(event)" placeholder="بنووسە..." autofocus autocomplete="off">
    </div>

    <div id="multiMatchList"></div>

    <div id="parking-fields" style="display: none;">
        <div class="form-group"><label>ژمارەی مۆبایل</label><input type="text" id="resPhone" placeholder="07xx xxx xxxx"></div>
    </div>

    <div id="normal-fields">
        <div class="row-group">
            <div class="form-group"><label>جۆری سەیارە</label><input type="text" id="resType" readonly></div>
            <div class="form-group"><label>هێڵ</label><input type="text" id="resLine" readonly></div>
        </div>
    </div>

    <div class="form-group">
        <label>نرخ</label>
        <div class="price-container">
            <input type="number" id="resPrice" readonly>
            <button type="button" class="btn-half" onclick="makeHalfPrice()" title="کردنی بە نیوەی نرخ">½</button>
        </div>
    </div>
    
    <div class="form-group"><label>تێبینی</label><input type="text" id="resNote" placeholder="تێبینی..."></div>

    <button class="btn-save" onclick="handleAction()">خەزن و پڕینت (Enter)</button>
</div>

<div id="report-modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h3 style="margin:0;">ڕاپۆرتی کارەکانی ئەمڕۆم</h3>
            <button onclick="closeReport()" style="background:var(--danger); color:white; padding:5px 15px; font-size:16px;">X</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>وەسڵ</th>
                    <th>کات</th>
                    <th>ژمارە</th>
                    <th>هێڵ</th>
                    <th>نرخ</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <div id="report-summary" style="margin-top:15px; font-weight:bold; text-align:left; color: var(--dark);"></div>
    </div>
</div>

<div id="invoice-print">
    <img src="https://arduexcel.github.io/img/ms-icon-144x144.png" width="60">
    <h4 id="p-title" style="margin:5px 0;">وەسڵ</h4>
    <div style="border: 2px solid black; display: inline-block; padding: 2px 10px; margin: 5px 0; font-size: 22px; font-weight: bold;">
        No: <span id="p-seq">0</span>
    </div>
    <hr>
    <p style="font-size:22px; margin:2px 0;">کارمەند: <span id="p-user"></span></p>
    <p style="font-size:30px; margin:2px 0;">: <span id="p-date"></span></p>
    <h1 id="p-num" style="margin:10px 0; font-size:38px;"></h1>
    <p style="margin:30px 0;">جۆر: <b id="p-type"></b> | هێڵ: <b id="p-line"></b></p>
    <p id="p-phone-row" style="margin:5px 0;">مۆبایل: <b id="p-phone"></b></p>
    <p id="p-note-row" style="margin:5px 0;">تێبینی: <b id="p-note"></b></p>
    <hr>
    <h2 id="p-price" style="margin:10px 0;"></h2>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCuUstd-6d0E-EbmQipv2mWk-bA55ajpQ0",
        authDomain: "car-system-4594d.firebaseapp.com",
        projectId: "car-system-4594d",
        storageBucket: "car-system-4594d.firebasestorage.app",
        messagingSenderId: "719030469585",
        appId: "1:719030469585:web:7a23645b9e684b727dd6f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allCars = [];
    let currentUser = "";
    let isParking = false;

    window.onload = async function() {
        const empSnap = await db.collection("Employees").where("role", "==", "staff").get();
        const select = document.getElementById('userSelect');
        select.innerHTML = '<option value="">ناو هەڵبژێرە...</option>';
        empSnap.forEach(doc => { select.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; });
        
        const carSnap = await db.collection("Cars").get();
        allCars = carSnap.docs.map(doc => doc.data());
    };

    function login() {
        currentUser = document.getElementById('userSelect').value;
        if(!currentUser) return alert("ناوەکەت هەڵبژێرە");
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        updateMyStats();
    }

    function logout() {
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('login-overlay').style.display = 'flex';
    }

    // فەنکشنی گەڕان کە پشتگیری چەند هێڵێک دەکات بۆ یەک ژمارە
    function searchCarLocally(num) {
        const listDiv = document.getElementById('multiMatchList');
        listDiv.innerHTML = "";
        listDiv.style.display = "none";
        
        if(isParking || !num) return;

        const matches = allCars.filter(c => String(c.number) === String(num));
        
        if(matches.length === 1) {
            selectCarMatch(matches[0]);
        } else if (matches.length > 1) {
            listDiv.style.display = "block";
            listDiv.innerHTML = "<p style='margin:5px 0; color:#856404; font-size:14px;'>ئەم ژمارەیە لە چەند هێڵێک هەیە، یەکێکیان هەڵبژێرە:</p>";
            matches.forEach(m => {
                const item = document.createElement('div');
                item.className = 'match-item';
                item.innerHTML = `<span><b>${m.line}</b> (${m.type})</span> <span>${m.price} د.ع</span>`;
                item.onclick = () => selectCarMatch(m);
                listDiv.appendChild(item);
            });
            resetFormOnlyFields();
        } else {
            resetForm();
        }
    }

    function selectCarMatch(car) {
        document.getElementById('resType').value = car.type || "تایبەت";
        document.getElementById('resLine').value = car.line;
        document.getElementById('resPrice').value = car.price;
        document.getElementById('multiMatchList').style.display = "none";
    }

    function resetFormOnlyFields() {
        document.getElementById('resType').value = "";
        document.getElementById('resLine').value = "";
        document.getElementById('resPrice').value = "";
    }

    function makeHalfPrice() {
        const priceInput = document.getElementById('resPrice');
        let currentPrice = parseInt(priceInput.value);
        if (!currentPrice || currentPrice <= 0) return alert("سەرەتا ژمارەی سەیارەکە هەڵبژێرە");
        priceInput.value = (currentPrice === 6500) ? 3000 : currentPrice / 2;
    }

    async function updateMyStats() {
        const today = new Date().toLocaleDateString('en-CA');
        const snap = await db.collection("Invoices").where("searchDate", "==", today).where("employee", "==", currentUser).get();
        let total = 0;
        snap.forEach(doc => total += parseInt(doc.data().price || 0));
        document.getElementById('myTotalMoney').innerText = total.toLocaleString() + " دینار";
        document.getElementById('myTotalCount').innerText = snap.size;
    }

    async function getDailySequence() {
        const today = new Date().toLocaleDateString('en-CA');
        const counterRef = db.collection("Counters").doc("daily_invoice_seq");
        return await db.runTransaction(async (transaction) => {
            const doc = await transaction.get(counterRef);
            if (!doc.exists || doc.data().lastDate !== today) {
                transaction.set(counterRef, { currentSeq: 1, lastDate: today });
                return 1;
            } else {
                const newSeq = (doc.data().currentSeq || 0) + 1;
                transaction.update(counterRef, { currentSeq: newSeq });
                return newSeq;
            }
        });
    }

    async function handleAction() {
        const numInput = document.getElementById('carNumberInput');
        const num = numInput.value.trim();
        const price = document.getElementById('resPrice').value;
        const line = document.getElementById('resLine').value;

        if(!num || !price || (!isParking && !line)) return alert("تکایە هەموو خانەکان پڕ بکەرەوە یان هێڵەکە هەڵبژێرە");

        const seqNum = await getDailySequence();
        const data = {
            invoiceNo: seqNum,
            employee: currentUser,
            carNumber: num,
            price: price,
            type: document.getElementById('resType').value || "نادیار",
            line: line || "پارکینگ",
            phone: isParking ? document.getElementById('resPhone').value : "",
            note: document.getElementById('resNote').value,
            searchDate: new Date().toLocaleDateString('en-CA'),
            date: new Date().toLocaleString('ku-IQ'),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection("Invoices").add(data);
        
        document.getElementById('p-seq').innerText = seqNum;
        document.getElementById('p-title').innerText = isParking ? "وەسڵی پارکینگ" : "تێرمناڵی سه‌ره‌كی سلێمانی";
        document.getElementById('p-num').innerText = data.carNumber;
        document.getElementById('p-type').innerText = data.type;
        document.getElementById('p-line').innerText = data.line;
        document.getElementById('p-price').innerText = data.price + " دینار";
        document.getElementById('p-user').innerText = data.employee;
        document.getElementById('p-date').innerText = data.date;
        document.getElementById('p-phone-row').style.display = (isParking && data.phone) ? "block" : "none";
        document.getElementById('p-phone').innerText = data.phone;
        document.getElementById('p-note-row').style.display = data.note ? "block" : "none";
        document.getElementById('p-note').innerText = data.note;

        window.print();
        updateMyStats();
        
        numInput.value = "";
        document.getElementById('resNote').value = "";
        document.getElementById('resPhone').value = "";
        document.getElementById('multiMatchList').style.display = "none";
        numInput.focus();
        if(isParking) document.getElementById('resPrice').value = "";
        resetFormOnlyFields();
    }

    function toggleParkingMode() {
        isParking = !isParking;
        document.getElementById('parkingModeBtn').classList.toggle('parking-active');
        document.getElementById('normal-fields').style.display = isParking ? 'none' : 'block';
        document.getElementById('parking-fields').style.display = isParking ? 'block' : 'none';
        document.getElementById('multiMatchList').style.display = "none";
        const pInput = document.getElementById('resPrice');
        pInput.readOnly = !isParking;
        if(isParking) { 
            pInput.value = ""; 
            document.getElementById('resLine').value = "پارکینگ";
            document.getElementById('resType').value = "پارکینگ";
        } else { resetForm(); }
    }

    async function openMyReport() {
        const today = new Date().toLocaleDateString('en-CA');
        const snap = await db.collection("Invoices").where("searchDate", "==", today).where("employee", "==", currentUser).get();
        const tbody = document.getElementById('report-body');
        tbody.innerHTML = "";
        let total = 0;
        const sortedDocs = snap.docs.sort((a, b) => (b.data().invoiceNo || 0) - (a.data().invoiceNo || 0));
        sortedDocs.forEach(doc => {
            const d = doc.data();
            total += parseInt(d.price || 0);
            tbody.innerHTML += `<tr>
                <td style="font-weight:bold; color:var(--primary);">${d.invoiceNo || '-'}</td>
                <td>${d.date.split(',')[1] || d.date}</td>
                <td>${d.carNumber}</td>
                <td>${d.line}</td>
                <td>${parseInt(d.price).toLocaleString()}</td>
            </tr>`;
        });
        document.getElementById('report-summary').innerText = `کۆی گشتی: ${total.toLocaleString()} دینار (${snap.size} وەسڵ)`;
        document.getElementById('report-modal').style.display = 'flex';
    }

    function closeReport() { document.getElementById('report-modal').style.display = 'none'; }
    function handleEnter(e) { if(e.key === "Enter") handleAction(); }
    function resetForm() {
        document.getElementById('resType').value = "";
        document.getElementById('resLine').value = isParking ? "پارکینگ" : "";
        document.getElementById('resPrice').value = "";
        document.getElementById('multiMatchList').style.display = "none";
    }
</script>
</body>
</html>
